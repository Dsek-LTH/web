# This workflow will do a clean installation of node dependencies, cache/restore them, build the source code and run tests across different versions of node
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: ["main", "new-design"]
  pull_request:
    branches: ["main", "new-design"]

env:
  HUSKY: 0

jobs:
  build:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres
        env:
          POSTGRES_PASSWORD: postgres
        # Set health checks to wait until postgres has started
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v3
        with:
          # fetch-tags: true # This should be enough, see https://github.com/actions/checkout/issues/1471
          fetch-depth: 0
      - uses: pnpm/action-setup@v2
        with:
          version: 9
      - name: Use Node.js latest LTS
        uses: actions/setup-node@v3
        with:
          node-version: lts/*
          cache: "pnpm"
      - run: pnpm i
      - run: pnpm prisma migrate deploy
      - run: pnpm snaplet-seed sync
      - run: pnpm run lint --max-warnings 0
      - run: pnpm run format
      - run: pnpm run test
      - run: pnpm run check --fail-on-warnings
      - run: pnpm run check-translations
      - run: pnpm run build
      # When adding a step to the list above, please consider adding it to the `ci-check` script in `package.json`.
